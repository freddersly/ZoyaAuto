name: Build rotation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build
        run: dotnet build -c Release

      - name: Gather the finished DLL
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $dll = Get-ChildItem -Recurse -Filter FredderslyGnb.dll -Path bin/Release | Select-Object -First 1
          Copy-Item $dll.FullName dist/

      - name: Post it as a downloadable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: dist/FredderslyGnb.dll
