name: Build rotation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download the current RSR + Dalamud libraries
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force -Path libs, dl | Out-Null

          # Dalamud developer libraries (Dalamud, Lumina, FFXIVClientStructs, ImGui, etc.)
          Invoke-WebRequest -Uri "https://goatcorp.github.io/dalamud-distrib/latest.zip" -OutFile dl/dalamud.zip
          Expand-Archive -Path dl/dalamud.zip -DestinationPath dl/dalamud -Force

          # RotationSolver Reborn's own libraries, from its latest release
          $headers = @{ "User-Agent" = "github-actions"; "Authorization" = "Bearer $env:GH_TOKEN" }
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/FFXIV-CombatReborn/RotationSolverReborn/releases/latest" -Headers $headers
          $zipUrl  = ($release.assets | Where-Object { $_.name -like "*.zip" } | Select-Object -First 1).browser_download_url
          Write-Host "RSR release tag: $($release.tag_name)"
          Write-Host "RSR zip asset:   $zipUrl"
          Invoke-WebRequest -Uri $zipUrl -OutFile dl/rsr.zip
          Expand-Archive -Path dl/rsr.zip -DestinationPath dl/rsr -Force

          # Flatten every DLL into /libs, keeping one copy of each name
          Get-ChildItem -Recurse -Filter *.dll -Path dl | ForEach-Object {
            $dest = Join-Path 'libs' $_.Name
            if (-not (Test-Path $dest)) { Copy-Item $_.FullName $dest }
          }

      - name: List downloaded libraries
        shell: pwsh
        run: |
          Write-Host "=== All DLLs now in libs/ ==="
          Get-ChildItem libs -Filter *.dll | Sort-Object Name | ForEach-Object { Write-Host $_.Name }
          Write-Host ""
          Write-Host "=== Key files present? ==="
          Write-Host ("RotationSolver.dll        : " + (Test-Path libs/RotationSolver.dll))
          Write-Host ("RotationSolver.Basic.dll  : " + (Test-Path libs/RotationSolver.Basic.dll))
          Write-Host ("Dalamud.dll               : " + (Test-Path libs/Dalamud.dll))

      - name: Build
        run: dotnet build -c Release

      - name: Gather the finished DLL
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $dll = Get-ChildItem -Recurse -Filter FredderslyGnb.dll -Path bin/Release | Select-Object -First 1
          Copy-Item $dll.FullName dist/

      - name: Post it as a downloadable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: dist/FredderslyGnb.dll
